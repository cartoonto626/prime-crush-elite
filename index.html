    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--green);
        font-family: 'Courier New', Courier, monospace;
        touch-action: none;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        height: 100dvh;
        width: 100dvw;
    }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    .overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.97);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 100;
        padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 20px);
        overflow-y: auto;
    }

    .hidden { display: none !important; }

    .game-title {
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: bold; letter-spacing: 0.1em;
        color: var(--green);
        text-shadow: 0 0 20px var(--green), 0 0 60px rgba(0,255,65,0.3);
        margin: 0 0 4px;
        animation: titlePulse 3s ease-in-out infinite;
    }

    .game-subtitle {
        font-size: 0.7rem; letter-spacing: 0.3em;
        color: rgba(0,255,65,0.5); margin: 0 0 14px;
    }

    @keyframes titlePulse {
        0%,100% { text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3); }
        50%      { text-shadow: 0 0 30px var(--green), 0 0 80px rgba(0,255,65,0.5); }
    }

    /* ===== LANG SELECTOR ===== */
    #lang-selector {
        display: flex; flex-wrap: wrap; gap: 5px;
        justify-content: center; margin-bottom: 14px;
    }

    .lang-btn {
        padding: 4px 9px;
        border: 1px solid rgba(0,255,65,0.2);
        background: none; color: rgba(0,255,65,0.45);
        font-family: inherit; font-size: 0.65rem;
        cursor: pointer; border-radius: 4px;
        transition: all 0.15s; letter-spacing: 0.03em;
    }
    .lang-btn:active, .lang-btn:hover { background: rgba(0,255,65,0.1); color: var(--green); }
    .lang-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,255,65,0.1); }

    /* ===== RANKS ===== */
    .ranks-grid {
        display: flex; gap: 10px; margin-bottom: 18px;
        flex-wrap: wrap; justify-content: center;
    }

    .rank-box {
        padding: 10px 14px;
        border: 1px solid rgba(0,255,65,0.22);
        background: rgba(0,255,65,0.04);
        border-radius: 8px; font-size: 0.75rem;
        color: #aaa; min-width: 88px; text-align: center;
    }

    .rank-box .mode-label {
        color: var(--green); font-weight: bold;
        font-size: 0.62rem; letter-spacing: 0.12em;
        display: block; margin-bottom: 2px;
    }

    .rank-box .best-label { font-size: 0.55rem; color: #444; }
    .rank-box .best-score { font-size: 1.1rem; color: #fff; font-weight: bold; }

    /* ===== DIFF BUTTONS ===== */
    .diff-buttons {
        display: flex; flex-direction: column; gap: 10px;
        width: 100%; max-width: 320px;
    }

    .diff-btn {
        position: relative; padding: 15px 22px;
        border: 1px solid rgba(0,255,65,0.4);
        background: rgba(0,255,65,0.05);
        color: var(--green); font-family: inherit;
        font-size: 0.95rem; font-weight: bold;
        letter-spacing: 0.05em; cursor: pointer;
        border-radius: 10px; transition: all 0.15s;
        text-align: left; overflow: hidden;
    }

    .diff-btn::before {
        content: ''; position: absolute; left: 0; top: 0;
        width: 3px; height: 100%; background: var(--green); transition: width 0.2s;
    }

    .diff-btn:active, .diff-btn:hover {
        background: rgba(0,255,65,0.12);
        border-color: var(--green); transform: translateX(4px);
    }
    .diff-btn:active::before { width: 6px; }

    .diff-btn .sub {
        display: block; font-size: 0.62rem; font-weight: normal;
        color: rgba(0,255,65,0.5); margin-top: 3px; letter-spacing: 0.02em;
    }

    .diff-btn.clerk { border-color: rgba(0,212,255,0.4); color: var(--blue); }
    .diff-btn.clerk::before { background: var(--blue); }
    .diff-btn.clerk:active, .diff-btn.clerk:hover { background: rgba(0,212,255,0.1); border-color: var(--blue); }

    .diff-btn.genius { border-color: rgba(255,204,0,0.4); color: var(--yellow); }
    .diff-btn.genius::before { background: var(--yellow); }
    .diff-btn.genius:active, .diff-btn.genius:hover { background: rgba(255,204,0,0.08); border-color: var(--yellow); }

    .pwa-hint { margin-top: 16px; font-size: 0.6rem; color: #282828; letter-spacing: 0.06em; text-align: center; }

    /* ===== GAME UI ===== */
    #game-ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    .hud {
        position: absolute; top: calc(var(--safe-top) + 12px);
        left: 0; width: 100%; display: flex;
        justify-content: space-between; align-items: center;
        padding: 0 16px; font-size: 0.9rem; letter-spacing: 0.05em;
    }

    .hud-score { font-weight: bold; color: var(--green); }
    .hud-combo { color: var(--yellow); font-size: 0.78rem; }
    .hud-level {
        font-size: 0.72rem; color: rgba(0,255,65,0.5);
        border: 1px solid rgba(0,255,65,0.2); padding: 2px 8px; border-radius: 4px;
    }

    .level-bar-wrap {
        position: absolute; top: calc(var(--safe-top) + 44px);
        left: 16px; right: 16px; height: 2px;
        background: rgba(0,255,65,0.1); border-radius: 1px;
    }

    #level-bar {
        height: 100%; background: var(--green); border-radius: 1px;
        width: 0%; transition: width 0.3s ease, background 0.5s;
        box-shadow: 0 0 6px var(--green);
    }

    #input-panel {
        position: absolute; bottom: calc(var(--safe-bottom) + 20px);
        left: 0; right: 0; pointer-events: auto;
        padding: 0 12px; display: flex; flex-direction: column;
        gap: 8px; align-items: center;
    }

    .primes-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .p-btn {
        width: 58px; height: 58px;
        border: 2px solid rgba(0,255,65,0.6); border-radius: 50%;
        background: rgba(0,255,65,0.07); color: var(--green);
        font-family: inherit; font-size: 1.3rem; font-weight: bold;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: transform 0.1s, background 0.1s;
    }

    .p-btn:active { transform: scale(0.88); background: rgba(0,255,65,0.25); border-color: var(--green); }

    .prime-btn {
        border-radius: 30px; width: auto; padding: 0 22px;
        border-color: rgba(255,255,255,0.5); color: #fff;
        background: rgba(255,255,255,0.05); font-size: 0.82rem;
        letter-spacing: 0.08em; height: 48px;
    }
    .prime-btn:active { background: rgba(255,255,255,0.15); border-color: #fff; }

    #danger-line {
        position: absolute; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--red), transparent);
        pointer-events: none; opacity: 0.4;
    }

    /* ===== GAME OVER ===== */
    .game-over-title {
        font-size: clamp(1.6rem, 5.5vw, 2.3rem);
        color: var(--red); letter-spacing: 0.05em;
        margin: 0 0 8px; text-align: center;
        animation: glow-red 1s ease-in-out infinite alternate;
    }

    @keyframes glow-red {
        from { text-shadow: 0 0 10px var(--red); }
        to   { text-shadow: 0 0 30px var(--red), 0 0 60px rgba(255,0,60,0.4); }
    }

    .final-score { font-size: 2.5rem; font-weight: bold; color: #fff; margin: 12px 0 4px; }
    .final-mode  { font-size: 0.72rem; color: #555; letter-spacing: 0.12em; margin-bottom: 20px; }

    .new-record {
        color: var(--yellow); font-weight: bold; letter-spacing: 0.15em;
        font-size: 0.85rem; border: 1px solid rgba(255,204,0,0.4);
        padding: 6px 20px; border-radius: 4px; margin-bottom: 20px;
        animation: recordPulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes recordPulse { from { opacity:0.7; } to { opacity:1; } }

    .action-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .action-btn {
        padding: 13px 28px;
        border: 1px solid rgba(0,255,65,0.5);
        background: rgba(0,255,65,0.06); color: var(--green);
        font-family: inherit; font-size: 0.88rem; font-weight: bold;
        letter-spacing: 0.08em; cursor: pointer; border-radius: 8px; transition: all 0.15s;
    }
    .action-btn:active, .action-btn:hover { background: rgba(0,255,65,0.15); border-color: var(--green); }

    #flash { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0; }
    #freeze-overlay {
        position: fixed; inset: 0; background: rgba(255,0,60,0.12);
        pointer-events: none; z-index: 8; display: none;
    }

// ============================================================
//  言語検出
// ============================================================
function detectLang() {
    const saved = localStorage.getItem('pc_lang');
    if (saved && LANGS[saved]) return saved;
    const navLangs = (navigator.languages || [navigator.language || 'en'])
        .map(l => l.toLowerCase().split('-')[0]);
    for (const l of navLangs) { if (LANGS[l]) return l; }
    return 'en';
}

let currentLang = detectLang();
const t = k => (LANGS[currentLang] || LANGS.en)[k] || k;

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('pc_lang', lang);
    document.documentElement.lang = lang;
    // RTL support for Arabic
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    buildLangSelector();
    buildDiffButtons();
    applyStaticTranslations();
    displayRanking();
}

function applyStaticTranslations() {
    setText('txt-subtitle',   t('subtitle'));
    setText('txt-pwa',        t('pwaHint'));
    setText('txt-go-title',   t('missionFail'));
    setText('new-record',     t('newRecord'));
    setText('btn-retry',      t('retry'));
    setText('btn-home',       t('home'));
    setText('score-label-hud', t('score'));
    if (level !== undefined) setText('level-display', t('level') + level);
}

function setText(id, val) { const el = qs(id); if (el) el.textContent = val; }

function buildLangSelector() {
    qs('lang-selector').innerHTML = Object.entries(LANG_LABELS).map(([code, label]) =>
        `<button class="lang-btn${currentLang===code?' active':''}" onclick="setLang('${code}')">${label}</button>`
    ).join('');
}

function buildDiffButtons() {
    qs('diff-buttons-container').innerHTML = `
        <button class="diff-btn" onclick="gameStart('KINDERGARTEN',15,[2,3,5])">
            ${t('kinder')} <span class="sub">${t('kinderSub')}</span>
        </button>
        <button class="diff-btn clerk" onclick="gameStart('CLERK',50,[2,3,5,7,11])">
            ${t('clerk')} <span class="sub">${t('clerkSub')}</span>
        </button>
        <button class="diff-btn genius" onclick="gameStart('GENIUS',100,[2,3,5,7,11,13,17,19])">
            ${t('genius')} <span class="sub">${t('geniusSub')}</span>
        </button>`;
}

// ============================================================
//  GAME
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let score, items, particles, floatLabels, isPlaying, canPress;
let diffMode, startLimit, currentPrimes, life, maxLife, spawnTimer;
let combo, comboTimer, level, animFrame;

const isP = n => { if(n<2) return false; for(let i=2,s=Math.sqrt(n);i<=s;i++) if(n%i===0) return false; return true; };
const qs  = id => document.getElementById(id);

// ===== RANKING =====
function getRanking(mode) {
    try { return JSON.parse(localStorage.getItem('pc_rank_'+mode)) || []; } catch(e) { return []; }
}

function saveScore(mode, newScore) {
    if (newScore === 0) return false;
    let ranks = getRanking(mode);
    const isNewBest = ranks.length===0 || newScore>ranks[0];
    ranks.push(newScore); ranks.sort((a,b)=>b-a); ranks=ranks.slice(0,5);
    try { localStorage.setItem('pc_rank_'+mode, JSON.stringify(ranks)); } catch(e) {}
    return isNewBest;
}

function displayRanking() {
    const modes  = ['KINDERGARTEN','CLERK','GENIUS'];
    const labels = [t('kinder'), t('clerk'), t('genius')];
    qs('ranking-container').innerHTML = modes.map((m,i) => {
        const ranks = getRanking(m);
        return `<div class="rank-box">
            <span class="mode-label">${labels[i]}</span>
            <span class="best-label">${t('best')}</span><br>
            <span class="best-score">${ranks[0]??'---'}</span>
        </div>`;
    }).join('');
}

// ===== LEVEL =====
function getLevel(sc)         { return Math.floor(sc/10)+1; }
function getLevelProgress(sc) { return ((sc%10)/10)*100; }

// ===== GAME START =====
function gameStart(mode, limit, primes) {
    if (animFrame) cancelAnimationFrame(animFrame);
    if (spawnTimer) clearTimeout(spawnTimer);

    diffMode=mode; startLimit=limit; currentPrimes=primes;
    life=maxLife=(mode==='KINDERGARTEN'?3:mode==='CLERK'?2:1);
    score=0; items=[]; particles=[]; floatLabels=[];
    combo=0; level=1;
    isPlaying=true; canPress=true;

    qs('start-menu').classList.add('hidden');
    qs('game-over').classList.add('hidden');
    qs('game-ui').classList.remove('hidden');

    // Input panel
    const panel = qs('input-panel');
    panel.innerHTML = '';
    const primeRow = document.createElement('div');
    primeRow.className = 'primes-row';
    primes.forEach(p => {
        const b = document.createElement('button');
        b.className='p-btn'; b.textContent=p;
        b.addEventListener('touchstart', e=>{e.preventDefault();action(p);},{passive:false});
        b.addEventListener('mousedown',  e=>{e.preventDefault();action(p);});
        primeRow.appendChild(b);
    });
    panel.appendChild(primeRow);

    const pb = document.createElement('button');
    pb.className='p-btn prime-btn'; pb.textContent=t('isPrime');
    pb.addEventListener('touchstart', e=>{e.preventDefault();action('IS_PRIME');},{passive:false});
    pb.addEventListener('mousedown',  e=>{e.preventDefault();action('IS_PRIME');});
    panel.appendChild(pb);

    qs('danger-line').style.top = (window.innerHeight - getPanelHeight() - 10) + 'px';
    qs('score-label-hud').textContent = t('score');
    updateUI();
    spawn();
    animFrame = requestAnimationFrame(tick);
}

function getPanelHeight() {
    const p = qs('input-panel'); return p ? p.offsetHeight+40 : 180;
}

// ===== ACTION =====
function action(p) {
    if (!isPlaying||items.length===0||!canPress) return;
    const target = items.reduce((prev,curr)=>prev.y>curr.y?prev:curr);
    let correct = false;

    if (isP(target.v)) {
        if (p==='IS_PRIME') { correct=true; target.dead=true; }
    } else {
        if (p!=='IS_PRIME' && target.v%p===0) {
            target.v/=p;
            if (target.v===1) target.dead=true;
            correct=true;
        }
    }

    if (correct) {
        combo++;
        clearTimeout(comboTimer);
        comboTimer = setTimeout(()=>{combo=0;updateComboDisplay();},2500);
        updateComboDisplay();
        const bonus = target.dead ? (1+Math.floor(combo/3)) : 1;
        score += bonus; updateUI();
        createExplosion(target.x, target.y, target.dead?'#00ff41':'#00d4ff');
        if (target.dead) {
            spawnFloat(target.x, target.y-20,
                combo>=3 ? t('combo')+combo : '+'+bonus,
                combo>=5?'#ffcc00':combo>=3?'#00ff41':'rgba(255,255,255,0.7)',
                combo>=3?'1rem':'0.8rem');
        }
    } else {
        combo=0; updateComboDisplay();
        applyPenalty();
    }
}

function updateComboDisplay() {
    const el=qs('combo-display');
    if (combo>=3) {
        el.classList.remove('hidden');
        el.textContent=t('combo')+combo;
        el.style.color=combo>=7?'#ff003c':combo>=5?'#ffcc00':'#00ff41';
    } else { el.classList.add('hidden'); }
}

// ===== PENALTY =====
function applyPenalty() {
    screenFlash('#ff003c',0.3);
    if (diffMode==='KINDERGARTEN') {
        items.forEach(it=>{it.y+=50;it.shake=6;}); return;
    }
    canPress=false;
    qs('input-panel').style.opacity='0.25';
    qs('freeze-overlay').style.display='block';
    setTimeout(()=>{
        if (!isPlaying) return;
        canPress=true;
        qs('input-panel').style.opacity='1';
        qs('freeze-overlay').style.display='none';
    },900);
    reduceLife(t('miscalc'));
}

// ===== UI UPDATE =====
function updateUI() {
    qs('score-val').textContent = score;
    qs('life-display').textContent = '❤️'.repeat(life)+'🖤'.repeat(maxLife-life);
    const lv = getLevel(score);
    if (lv!==level) {
        level=lv;
        screenFlash('#00ff41',0.2);
        spawnFloat(window.innerWidth/2, window.innerHeight/2, t('levelUp')+level, '#00ff41', '1.2rem');
    }
    setText('level-display', t('level')+level);
    const prog = getLevelProgress(score);
    qs('level-bar').style.width=prog+'%';
    const barColor = level>=5?'var(--yellow)':level>=3?'var(--blue)':'var(--green)';
    qs('level-bar').style.background=barColor;
    qs('level-bar').style.boxShadow=`0 0 6px ${barColor}`;
}

// ===== SPAWN =====
function spawn() {
    if (!isPlaying) return;
    const currentMax = startLimit + Math.floor(score/5)*12;
    const margin = 70;
    items.push({
        v: Math.floor(Math.random()*(currentMax-4))+4,
        x: margin+Math.random()*(window.innerWidth-margin*2),
        y: -60, dead:false, shake:0, age:0
    });
    spawnTimer = setTimeout(spawn, Math.max(500,3800-(score*45)));
}

// ===== LIFE =====
function reduceLife(reason) { life--; updateUI(); if(life<=0) gameOver(reason); }

// ===== GAME OVER =====
function gameOver(reason) {
    isPlaying=false;
    if (spawnTimer) clearTimeout(spawnTimer);
    if (animFrame) cancelAnimationFrame(animFrame);
    const isNew = saveScore(diffMode, score);
    setText('txt-go-title',  t('missionFail'));
    setText('fail-reason',   reason);
    setText('final-score-val', score);
    const modeLabel = {KINDERGARTEN:t('kinder'),CLERK:t('clerk'),GENIUS:t('genius')}[diffMode]||diffMode;
    setText('final-mode-label', modeLabel+' '+t('mode'));
    setText('new-record', t('newRecord'));
    setText('btn-retry', t('retry'));
    setText('btn-home',  t('home'));
    isNew ? qs('new-record').classList.remove('hidden') : qs('new-record').classList.add('hidden');
    qs('game-over').classList.remove('hidden');
    qs('game-ui').classList.add('hidden');
}

function retry() { gameStart(diffMode,startLimit,currentPrimes); }
function goHome() {
    isPlaying=false;
    if(spawnTimer) clearTimeout(spawnTimer);
    if(animFrame) cancelAnimationFrame(animFrame);
    qs('game-over').classList.add('hidden');
    qs('game-ui').classList.add('hidden');
    qs('start-menu').classList.remove('hidden');
    displayRanking();
}

// ===== PARTICLES =====
function createExplosion(x,y,color) {
    const count = color==='#00ff41'?18:10;
    for (let i=0;i<count;i++) {
        const angle=(Math.PI*2/count)*i+Math.random()*0.3;
        const speed=3+Math.random()*8;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1.0,color,size:2+Math.random()*4});
    }
}

function spawnFloat(x,y,text,color,size) { floatLabels.push({x,y,text,color,size,life:1.0}); }

function screenFlash(color,alpha) {
    const fl=qs('flash');
    fl.style.background=color; fl.style.opacity=alpha; fl.style.transition='none';
    requestAnimationFrame(()=>{fl.style.transition='opacity 0.4s ease';fl.style.opacity='0';});
}

// ===== RENDER =====
let lastTime=0;
function tick(ts) {
    if (!isPlaying) return;
    const dt = Math.min((ts-lastTime)/16.67,3);
    lastTime=ts;

    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid();

    ctx.save();
    particles.forEach(p=>{
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.15*dt; p.vx*=0.97; p.life-=0.03*dt;
        ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
        ctx.shadowColor=p.color; ctx.shadowBlur=6;
        ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    });
    particles=particles.filter(p=>p.life>0);
    ctx.restore();

    const dangerY = canvas.height - getPanelHeight() - 10;
    let target = items.length>0 ? items.reduce((prev,curr)=>prev.y>curr.y?prev:curr) : null;
    items=items.filter(it=>!it.dead);

    items.forEach(it=>{
        const speed=(diffMode==='GENIUS'?1.5:diffMode==='CLERK'?1.0:0.65)+(score/2000);
        it.y+=speed*dt; it.age++;
        if (it.shake>0) it.shake-=0.5;

        if (it.y>dangerY) {
            it.dead=true;
            createExplosion(it.x,it.y,'#ff003c');
            screenFlash('#ff003c',0.4);
            reduceLife(t('lineBreach'));
            return;
        }

        const dangerPct=Math.max(0,(it.y-dangerY*0.5)/(dangerY*0.5));
        const isTarget=it===target;
        const isPrime=isP(it.v);
        const baseColor=isPrime?'#00ff41':'#00d4ff';
        const dangerColor=`rgba(255,${Math.round(60*(1-dangerPct))},${Math.round(60*(1-dangerPct))},1)`;
        const finalColor=dangerPct>0.7?dangerColor:baseColor;
        const sx=it.shake>0?(Math.random()-0.5)*it.shake:0;

        if (isTarget) {
            ctx.save();
            ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2;
            ctx.shadowColor='#fff'; ctx.shadowBlur=8;
            roundRect(ctx,it.x+sx-45,it.y-50,90,70,8); ctx.stroke();
            ctx.restore();
        }

        ctx.save();
        ctx.font=`bold ${isTarget?46:38}px 'Courier New',monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle=finalColor; ctx.shadowColor=finalColor;
        ctx.shadowBlur=dangerPct>0.7?30:isTarget?20:10;
        ctx.globalAlpha=isTarget?1.0:0.75;
        ctx.fillText(it.v, it.x+sx, it.y-16);
        ctx.restore();

        if (diffMode==='KINDERGARTEN'&&!isPrime&&it.v<200) {
            const factors=currentPrimes.filter(p=>it.v%p===0);
            if (factors.length>0) {
                ctx.save();
                ctx.font='11px Courier New'; ctx.fillStyle='rgba(0,255,65,0.3)';
                ctx.textAlign='center'; ctx.fillText('÷'+factors[0],it.x,it.y+10);
                ctx.restore();
            }
        }
    });

    floatLabels.forEach(fl=>{
        fl.life-=0.025*dt; fl.y-=1.2*dt;
        ctx.save();
        ctx.font=`bold ${fl.size} 'Courier New',monospace`;
        ctx.textAlign='center'; ctx.fillStyle=fl.color;
        ctx.globalAlpha=fl.life; ctx.shadowColor=fl.color; ctx.shadowBlur=12;
        ctx.fillText(fl.text, fl.x, fl.y);
        ctx.restore();
    });
    floatLabels=floatLabels.filter(f=>f.life>0);

    animFrame=requestAnimationFrame(tick);
}

function drawGrid() {
    const step=60; ctx.save();
    ctx.strokeStyle='rgba(0,255,65,0.03)'; ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    ctx.restore();
}

function roundRect(ctx,x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}

// ===== KEYBOARD =====
window.addEventListener('keydown', e=>{
    if (!isPlaying) return;
    const map={'2':2,'3':3,'5':5,'7':7,'q':11,'w':13,'e':17,'r':19};
    if (map[e.key]!==undefined) action(map[e.key]);
    if (e.key==='p'||e.key===' ') action('IS_PRIME');
});

// ===== INIT =====
buildLangSelector();
buildDiffButtons();
applyStaticTranslations();
displayRanking();
</script>
